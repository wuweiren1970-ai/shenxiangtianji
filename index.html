<body>

    <script>
        // ============ 数据库 ============
        const classicalPhrases = {

            eyebrow: ["眉清目秀，聪慧过人", "浓眉大眼，义薄云天", "眉长过目，福寿绵长"],
            eye: ["眼若星辰，明察秋毫", "目光如炬，志向远大", "眼含笑意，人缘极佳"],

        const personalityTypes = [
            { type: "仁厚型", desc: "面容和善，待人以诚", traits: ["心地善良", "乐于助人", "重情重义", "人缘极佳"], careers: ["教育", "医疗", "公益"], element: "土" },
            { type: "智慧型", desc: "目光如炬，思维敏捷", traits: ["聪慧过人", "善于思考", "洞察力强", "学习能力强"], careers: ["科研", "咨询", "金融"], element: "水" },
            { type: "坚毅型", desc: "眉骨突出，意志坚定", traits: ["意志坚强", "百折不挠", "目标明确", "执行力强"], careers: ["管理", "创业", "军警"], element: "金" },
            { type: "温和型", desc: "面容柔和，性情温顺", traits: ["性格温和", "善于倾听", "包容心强", "家庭和睦"], careers: ["艺术", "设计", "服务"], element: "木" },
            { type: "进取型", desc: "目光炯炯，神采飞扬", traits: ["积极进取", "敢于挑战", "领导力强", "事业有成"], careers: ["销售", "市场", "管理"], element: "火" },
            { type: "艺术型", desc: "眼神灵动，气质独特", traits: ["富有创意", "审美独特", "情感丰富", "才华横溢"], careers: ["艺术", "设计", "写作"], element: "木" },
            { type: "稳重型", desc: "面容方正，举止沉稳", traits: ["踏实稳重", "责任心强", "值得信赖", "晚年运佳"], careers: ["财务", "法律", "公务员"], element: "土" },
            { type: "灵动型", desc: "眼神流转，反应敏捷", traits: ["机智灵活", "善于应变", "口才出众", "社交能力强"], careers: ["媒体", "公关", "主持"], element: "火" }
        ];

        const careerFortunes = [
            { text: "事业如旭日东升，宜把握机遇，大展宏图", level: "大吉" },
            { text: "财运亨通，正财偏财皆有收获", level: "吉" },
            { text: "贵人运旺，得遇良师益友提携", level: "吉" },
            { text: "宜稳扎稳打，厚积薄发，终成大器", level: "中吉" },
            { text: "思维活跃，适合创意、策划类工作", level: "吉" },
            { text: "人际关系和谐，团队协作得心应手", level: "吉" },
            { text: "今年有升迁之机，宜主动争取", level: "大吉" },
            { text: "偏财运佳，可适当投资理财", level: "中吉" }
        ];

        const loveFortunes = [
            { text: "桃花运旺，良缘将至，宜把握", status: "单身" },
            { text: "感情专一，白头偕老之相", status: "已婚" },
            { text: "异性缘佳，但需谨慎选择", status: "单身" },
            { text: "晚婚更吉，先立业后成家", status: "单身" },
            { text: "夫妻宫饱满，婚姻美满幸福", status: "已婚" },
            { text: "感情之路虽有波折，终成眷属", status: "恋爱" },
            { text: "今年有喜事临门之兆", status: "恋爱" },
            { text: "红鸾星动，有望遇到正缘", status: "单身" }
        ];

        const healthFortunes = ["身体康健，精神饱满", "宜多运动，保持身心平衡", "注意饮食规律，脾胃需调养", "精力充沛，但忌过度劳累", "心态平和，百病不侵", "养生之道在于动静结合", "宜早睡早起，养精蓄锐"];

        const blessings = [
            "相由心生，境随心转。修心养性，福泽绵长。",
            "命由己造，福自己求。行善积德，天必佑之。",
            "面相乃一时之表，心相乃一世之根。心存善念，必得善果。",
            "天机玄妙，仅供参考。把握当下，创造未来。",
            "三分天注定，七分靠打拼。爱拼才会赢。"
        ];

        // ============ 全局变量 ============
        let faceMesh = null, faceFeatures = null, currentResult = null;

        // ============ 初始化 ============
        async function initFaceMesh() {
            faceMesh = new FaceMesh({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
            });
            faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
            faceMesh.onResults(onFaceResults);
        }

        function onFaceResults(results) {
            const canvas = document.getElementById('faceCanvas');
            const ctx = canvas.getContext('2d');
            const img = document.getElementById('previewImg');
            
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (results.multiFaceLandmarks?.length > 0) {
                const landmarks = results.multiFaceLandmarks[0];
                drawConnectors(ctx, landmarks, FACEMESH_TESSELATION, { color: '#d4af37', lineWidth: 1 });
                drawConnectors(ctx, landmarks, FACEMESH_FACE_OVAL, { color: '#d4af37', lineWidth: 2 });
                faceFeatures = extractFaceFeatures(landmarks);
                document.getElementById('landmarksInfo').innerHTML = '<p>✓ 已识别面部特征，可以开始测算</p>';
                document.getElementById('analyzeBtn').disabled = false;
            } else {
                faceFeatures = null;
                document.getElementById('landmarksInfo').innerHTML = '<p style="color: #ff6b6b;">⚠️ 未检测到面部，请重新选择照片</p>';
                document.getElementById('analyzeBtn').disabled = true;
            }
            document.getElementById('landmarksInfo').style.display = 'block';
        }

        function extractFaceFeatures(landmarks) {
            const leftEye = landmarks[33], rightEye = landmarks[263], noseTip = landmarks[1];
            const chin = landmarks[152], forehead = landmarks[10];
            
            const faceHeight = Math.sqrt(Math.pow(chin.x - forehead.x, 2) + Math.pow(chin.y - forehead.y, 2));
            const faceWidth = Math.sqrt(Math.pow(landmarks[454].x - landmarks[234].x, 2) + Math.pow(landmarks[454].y - landmarks[234].y, 2));
            const ratio = faceHeight / faceWidth;
            
            let faceShape = "oval";
            if (ratio > 1.4) faceShape = "long";
            else if (ratio < 1.2) faceShape = "round";
            else if (faceWidth / faceHeight > 0.8) faceShape = "square";
            
            const eyeSize = Math.sqrt(Math.pow(landmarks[133].x - landmarks[33].x, 2)) / faceWidth;
            const eyebrowCurve = landmarks[105].y - landmarks[55].y;
            const noseWidth = Math.sqrt(Math.pow(landmarks[436].x - landmarks[206].x, 2)) / faceWidth;
            
            return {
                faceShape,
                eyeSize: eyeSize > 0.15 ? "large" : (eyeSize > 0.12 ? "medium" : "small"),
                eyebrowShape: eyebrowCurve > 0.02 ? "curved" : "straight",
                noseWidth: noseWidth > 0.12 ? "wide" : "narrow",
                hasDetected: true
            };
        }

        // ============ 文件上传 ============
        document.getElementById('fileInput').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = async function(event) {
                const img = document.getElementById('previewImg');
                img.src = event.target.result;
                img.onload = async function() {
                    document.getElementById('uploadSection').style.display = 'none';
                    document.getElementById('previewSection').classList.add('active');
                    if (!faceMesh) await initFaceMesh();
                    await faceMesh.send({ image: img });
                };
            };
            reader.readAsDataURL(file);
        });

        // ============ 分析 ============
        function startAnalyze() {
            document.getElementById('previewSection').classList.remove('active');
            document.getElementById('loading').classList.add('active');
            
            setTimeout(() => {
                generateResult();
                document.getElementById('loading').classList.remove('active');
                document.getElementById('resultSection').classList.add('active');
            }, 2500);
        }

        function generateResult() {
            const features = faceFeatures || { faceShape: "oval", eyeSize: "medium", eyebrowShape: "curved", noseWidth: "medium" };
            
            let personalityIndex = 0;
            if (features.faceShape === "round") personalityIndex = 0;
            else if (features.eyeSize === "large") personalityIndex = 1;
            else if (features.eyebrowShape === "straight") personalityIndex = 2;
            else if (features.faceShape === "oval") personalityIndex = 3;
            else if (features.noseWidth === "wide") personalityIndex = 4;
            else personalityIndex = Math.floor(Math.random() * personalityTypes.length);
            
            const personality = personalityTypes[personalityIndex];
            let classical = classicalPhrases.general[Math.floor(Math.random() * classicalPhrases.general.length)];
            if (features.eyebrowShape === "curved") classical = classicalPhrases.eyebrow[Math.floor(Math.random() * classicalPhrases.eyebrow.length)];
            else if (features.eyeSize === "large") classical = classicalPhrases.eye[Math.floor(Math.random() * classicalPhrases.eye.length)];
            
            const career = careerFortunes[Math.floor(Math.random() * careerFortunes.length)];
            const love = loveFortunes[Math.floor(Math.random() * loveFortunes.length)];
            const health = healthFortunes[Math.floor(Math.random() * healthFortunes.length)];
            
            currentResult = { classical, personality, career, love, health, features, blessing: blessings[Math.floor(Math.random() * blessings.length)] };
            
            document.getElementById('classicalText').textContent = `「${classical}」`;
            
            let resultHTML = `
                <div class="fortune-item">
                    <div class="fortune-label">☯ 五行属性</div>
                    <div class="modern-text">${personality.element}行 · ${personality.type}</div>
                </div>
            `;
            
            if (features.hasDetected) {
                resultHTML += `
                    <div class="fortune-item">
                        <div class="fortune-label">👤 面部特征</div>
                        <div class="face-features">
                            <div class="feature-tag">${getFaceShapeName(features.faceShape)}</div>
                            <div class="feature-tag">${getEyeSizeName(features.eyeSize)}</div>
                            <div class="feature-tag">${getEyebrowName(features.eyebrowShape)}</div>
                            <div class="feature-tag">${getNoseName(features.noseWidth)}</div>
                        </div>
                    </div>
                `;
            }
            
            resultHTML += `
                <div class="fortune-item">
                    <div class="fortune-label">🎭 性格特点</div>
                    <div class="modern-text">${personality.desc}。<br>${personality.traits.join('、')}。适合：${personality.careers.join('、')}。</div>
                </div>
                <div class="fortune-item">
                    <div class="fortune-label">💼 事业前程 [${career.level}]</div>
                    <div class="modern-text">${career.text}</div>
                </div>
                <div class="fortune-item">
                    <div class="fortune-label">💕 姻缘情感 [${love.status}]</div>
                    <div class="modern-text">${love.text}</div>
                </div>
                <div class="fortune-item">
                    <div class="fortune-label">🌿 健康运势</div>
                    <div class="modern-text">${health}</div>
                </div>
            `;
            
            document.getElementById('resultContent').innerHTML = resultHTML;
            document.getElementById('finalBlessing').textContent = currentResult.blessing;
        }

        function getFaceShapeName(s) { return { round: "圆润", oval: "椭圆", long: "长形", square: "方正" }[s] || s; }
        function getEyeSizeName(s) { return { large: "大而有神", medium: "适中", small: "细长" }[s] || s; }
        function getEyebrowName(s) { return { curved: "弯曲", straight: "平直" }[s] || s; }
        function getNoseName(s) { return { wide: "宽鼻", narrow: "窄鼻" }[s] || s; }

        // ============ 海报生成 ============
        async function generatePoster() {
            if (!currentResult) return;
            
            const canvas = document.getElementById('posterCanvas');
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 2;
            
            canvas.width = 600 * dpr;
            canvas.height = 900 * dpr;
            canvas.style.width = '100%';
            canvas.style.height = 'auto';
            ctx.scale(dpr, dpr);
            
            // 背景
            const grad = ctx.createLinearGradient(0, 0, 600, 900);
            grad.addColorStop(0, '#1a1a2e');
            grad.addColorStop(0.5, '#16213e');
            grad.addColorStop(1, '#0f3460');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 600, 900);
            
            // 边框
            ctx.strokeStyle = '#d4af37';
            ctx.lineWidth = 6;
            ctx.strokeRect(15, 15, 570, 870);
            ctx.lineWidth = 1;
            ctx.strokeRect(25, 25, 550, 850);
            
            // 标题
            ctx.fillStyle = '#d4af37';
            ctx.font = 'bold 32px -apple-system, PingFang SC';
            ctx.textAlign = 'center';
            ctx.fillText('☯ 神相天机 ☯', 300, 70);
            ctx.font = '16px -apple-system, PingFang SC';
            ctx.fillStyle = '#b8860b';
            ctx.fillText('AI面相分析', 300, 95);
            
            // 古典批语
            ctx.fillStyle = '#f4e4c1';
            ctx.font = 'italic 16px -apple-system, PingFang SC';
            wrapText(ctx, `「${currentResult.classical}」`, 300, 140, 520, 24);
            
            // 分隔线
            ctx.strokeStyle = '#d4af37';
            ctx.beginPath();
            ctx.moveTo(80, 180);
            ctx.lineTo(520, 180);
            ctx.stroke();
            
            // 内容
            let y = 215;
            ctx.textAlign = 'left';
            
            ctx.fillStyle = '#d4af37';
            ctx.font = 'bold 15px -apple-system, PingFang SC';
            ctx.fillText(`☯ ${currentResult.personality.element}行 · ${currentResult.personality.type}`, 50, y);
            y += 28;
            
            ctx.fillStyle = '#e8dcc8';
            ctx.font = '13px -apple-system, PingFang SC';
            wrapText(ctx, `${currentResult.personality.desc}。${currentResult.personality.traits.join('、')}。`, 50, y, 500, 20);
            y += 45;
            
            ctx.fillStyle = '#d4af37';
            ctx.font = 'bold 15px -apple-system, PingFang SC';
            ctx.fillText(`💼 事业 [${currentResult.career.level}]`, 50, y);
            y += 24;
            ctx.fillStyle = '#e8dcc8';
            ctx.font = '13px -apple-system, PingFang SC';
            wrapText(ctx, currentResult.career.text, 50, y, 500, 20);
            y += 42;
            
            ctx.fillStyle = '#d4af37';
            ctx.font = 'bold 15px -apple-system, PingFang SC';
            ctx.fillText(`💕 姻缘 [${currentResult.love.status}]`, 50, y);
            y += 24;
            ctx.fillStyle = '#e8dcc8';
            wrapText(ctx, currentResult.love.text, 50, y, 500, 20);
            y += 42;
            
            ctx.fillStyle = '#d4af37';
            ctx.font = 'bold 15px -apple-system, PingFang SC';
            ctx.fillText(`🌿 健康`, 50, y);
            y += 24;
            ctx.fillStyle = '#e8dcc8';
            wrapText(ctx, currentResult.health, 50, y, 500, 20);
            y += 50;
            
            // 分隔线
            ctx.strokeStyle = '#d4af37';
            ctx.beginPath();
            ctx.moveTo(80, y);
            ctx.lineTo(520, y);
            ctx.stroke();
            y += 30;
            
            // 祝福
            ctx.fillStyle = '#ffd700';
            ctx.font = 'italic 15px -apple-system, PingFang SC';
            ctx.textAlign = 'center';
            wrapText(ctx, currentResult.blessing, 300, y, 520, 22);
            
            // 底部
            ctx.fillStyle = '#b8860b';
            ctx.font = '11px -apple-system, PingFang SC';
            ctx.fillText('仅供娱乐 · 无科学依据 · 扫码测面相', 300, 870);
            
            document.getElementById('posterModal').classList.add('active');
        }

        function wrapText(ctx, text, x, y, maxW, lh) {
            const chars = text.split('');
            let line = '';
            for (let i = 0; i < chars.length; i++) {
                const test = line + chars[i];
                if (ctx.measureText(test).width > maxW && i > 0) {
                    ctx.fillText(line, x, y);
                    line = chars[i];
                    y += lh;
                } else {
                    line = test;
                }
            }
            ctx.fillText(line, x, y);
        }

        function closeModal() {
            document.getElementById('posterModal').classList.remove('active');
        }

        async function savePoster() {
            const canvas = document.getElementById('posterCanvas');
            try {
                const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
                const file = new File([blob], `神相天机_${Date.now()}.png`, { type: 'image/png' });
                
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({ files: [file], title: '我的面相分析' });
                } else {
                    const url = canvas.toDataURL();
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `神相天机_${Date.now()}.png`;
                    a.click();
                }
            } catch (e) {
                const url = canvas.toDataURL();
                const a = document.createElement('a');
                a.href = url;
                a.download = `神相天机_${Date.now()}.png`;
                a.click();
            }
        }

        // ============ 分享 ============
        async function shareResult() {
            if (!currentResult) return;
            
            const text = `【神相天机】\n${currentResult.classical}\n\n五行：${currentResult.personality.element}行 · ${currentResult.personality.type}\n性格：${currentResult.personality.traits.join('、')}\n\n事业：${currentResult.career.text}\n姻缘：${currentResult.love.text}\n\n${currentResult.blessing}\n\n（仅供娱乐，无科学依据）`;
            
            try {
                if (navigator.share) {
                    await navigator.share({ title: '神相天机 - 我的面相分析', text: text });
                } else {
                    await navigator.clipboard.writeText(text);
                    alert('测算结果已复制！去粘贴分享给朋友吧');
                }
            } catch (e) {
                await navigator.clipboard.writeText(text);
                alert('测算结果已复制！去粘贴分享给朋友吧');
            }
        }

        // ============ 重新开始 ============
        function restart() {
            document.getElementById('resultSection').classList.remove('active');
            document.getElementById('uploadSection').style.display = 'block';
            document.getElementById('fileInput').value = '';
            document.getElementById('landmarksInfo').style.display = 'none';
            document.getElementById('analyzeBtn').disabled = true;
            faceFeatures = null;
            currentResult = null;
        }
    </script>
</body>
</html>
