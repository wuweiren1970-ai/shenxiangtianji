        function handleFileSelect(event) {

            if (!file) return;

            reader.onload = async function(e) {
                const img = document.getElementById('previewImg');
                img.src = e.target.result;
                img.onload = async function() {
                    document.getElementById('photoSourceSection').style.display = 'none';
                    document.getElementById('previewSection').classList.add('active');
                    if (!faceMesh) await initFaceMesh();
                    await faceMesh.send({ image: img });
                };
            };
            reader.readAsDataURL(file);
        }

        // ============ 初始化 ============
        async function initFaceMesh() {
            faceMesh = new FaceMesh({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
            });
            faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
            faceMesh.onResults(onFaceResults);
        }

        function onFaceResults(results) {
            const canvas = document.getElementById('faceCanvas');
            const ctx = canvas.getContext('2d');
            const img = document.getElementById('previewImg');
            
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (results.multiFaceLandmarks?.length > 0) {
                const landmarks = results.multiFaceLandmarks[0];
                drawConnectors(ctx, landmarks, FACEMESH_TESSELATION, { color: '#d4af37', lineWidth: 1 });
                drawConnectors(ctx, landmarks, FACEMESH_FACE_OVAL, { color: '#d4af37', lineWidth: 2 });
                faceFeatures = extractFaceFeatures(landmarks);
                document.getElementById('landmarksInfo').innerHTML = '<p>✓ 已识别面部特征，可以开始测算</p>';
                document.getElementById('analyzeBtn').disabled = false;
            } else {
                faceFeatures = null;
                document.getElementById('landmarksInfo').innerHTML = '<p style="color: #ff6b6b;">⚠️ 未检测到面部，请重新选择照片</p>';
                document.getElementById('analyzeBtn').disabled = true;
            }
            document.getElementById('landmarksInfo').style.display = 'block';
        }

        function extractFaceFeatures(landmarks) {
            const leftEye = landmarks[33], rightEye = landmarks[263], noseTip = landmarks[1];
            const chin = landmarks[152], forehead = landmarks[10];
            
            const faceHeight = Math.sqrt(Math.pow(chin.x - forehead.x, 2) + Math.pow(chin.y - forehead.y, 2));
            const faceWidth = Math.sqrt(Math.pow(landmarks[454].x - landmarks[234].x, 2) + Math.pow(landmarks[454].y - landmarks[234].y, 2));
            const ratio = faceHeight / faceWidth;
            
            let faceShape = "oval";
            if (ratio > 1.4) faceShape = "long";
            else if (ratio < 1.2) faceShape = "round";
            else if (faceWidth / faceHeight > 0.8) faceShape = "square";
            
            const eyeSize = Math.sqrt(Math.pow(landmarks[133].x - landmarks[33].x, 2)) / faceWidth;
            const eyebrowCurve = landmarks[105].y - landmarks[55].y;
            const noseWidth = Math.sqrt(Math.pow(landmarks[436].x - landmarks[206].x, 2)) / faceWidth;
            
            return {
                faceShape,
                eyeSize: eyeSize > 0.15 ? "large" : (eyeSize > 0.12 ? "medium" : "small"),
                eyebrowShape: eyebrowCurve > 0.02 ? "curved" : "straight",
                noseWidth: noseWidth > 0.12 ? "wide" : "narrow",
                hasDetected: true
            };
        }

        // ============ 分析 ============
        function startAnalyze() {
            document.getElementById('previewSection').classList.remove('active');
            document.getElementById('loading').classList.add('active');

                generateResult();
                document.getElementById('loading').classList.remove('active');
                document.getElementById('resultSection').classList.add('active');
            }, 2500);

        function getLifeStage(age) {
            if (age < 18) return 'youth';
            if (age <= 30) return 'youth';
            if (age <= 45) return 'prime';
            if (age <= 60) return 'middle';
            return 'senior';
        }

        function generateLifePath(gender, age, personality) {
            const stage = getLifeStage(age);
            const stageData = lifeStages[stage][gender];
            
            // 根据性格调整人生走向
            const paths = [];
            
            // 当前阶段
            paths.push({
                age: `${age}岁（当前）`,
                text: stageData.career[Math.floor(Math.random() * stageData.career.length)]
            });
            
            // 下一阶段
            if (stage === 'youth') {
                paths.push({
                    age: `${age + 5}-${age + 10}岁`,
                    text: lifeStages.prime[gender].career[0]
                });
                paths.push({
                    age: `${age + 15}-${age + 20}岁`,
                    text: lifeStages.middle[gender].career[1]
                });
            } else if (stage === 'prime') {
                paths.push({
                    age: `${age + 5}-${age + 10}岁`,
                    text: lifeStages.middle[gender].career[Math.floor(Math.random() * lifeStages.middle[gender].career.length)]
                });
                paths.push({
                    age: `60岁以后`,
                    text: lifeStages.senior[gender].career[0]
                });
            } else if (stage === 'middle') {
                paths.push({
                    age: `60岁以后`,
                    text: lifeStages.senior[gender].career[Math.floor(Math.random() * lifeStages.senior[gender].career.length)]
                });
            }
            
            return paths;
        }

        function generateResult() {
            const features = faceFeatures || { faceShape: "oval", eyeSize: "medium", eyebrowShape: "curved", noseWidth: "medium" };
            
            let personalityIndex = 0;
            if (features.faceShape === "round") personalityIndex = 0;
            else if (features.eyeSize === "large") personalityIndex = 1;
            else if (features.eyebrowShape === "straight") personalityIndex = 2;
            else if (features.faceShape === "oval") personalityIndex = 3;
            else if (features.noseWidth === "wide") personalityIndex = 4;
            else personalityIndex = Math.floor(Math.random() * personalityTypes.length);
            
            const personality = personalityTypes[personalityIndex];
            let classical = classicalPhrases.general[Math.floor(Math.random() * classicalPhrases.general.length)];
            if (features.eyebrowShape === "curved") classical = classicalPhrases.eyebrow[Math.floor(Math.random() * classicalPhrases.eyebrow.length)];

            }
            
            resultHTML += `

                </div>
                <div class="fortune-item">

                    <div class="modern-text">${love.text}</div>
                </div>

                    <div class="fortune-label">🌿 健康运势</div>
                    <div class="modern-text">${health}</div>

            `;
            
            // 添加人生走向
            resultHTML += `
                <div class="life-path">
                    <div class="life-path-title">🗓️ 人生走向预测</div>
                    <div class="timeline">
                        ${lifePath.map(item => `
                            <div class="timeline-item">

                                <div class="timeline-text">${item.text}</div>
                            </div>

            document.getElementById('resultContent').innerHTML = resultHTML;
            document.getElementById('finalBlessing').textContent = currentResult.blessing;
        }

        function getFaceShapeName(s) { return { round: "圆润", oval: "椭圆", long: "长形", square: "方正" }[s] || s; }
        function getEyeSizeName(s) { return { large: "大而有神", medium: "适中", small: "细长" }[s] || s; }
        function getEyebrowName(s) { return { curved: "弯曲", straight: "平直" }[s] || s; }
        function getNoseName(s) { return { wide: "宽鼻", narrow: "窄鼻" }[s] || s; }

        // ============ 海报生成 ============
        async function generatePoster() {
            if (!currentResult) return;
            
            const canvas = document.getElementById('posterCanvas');
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 2;
            
            canvas.width = 600 * dpr;

            canvas.style.width = '100%';
            canvas.style.height = 'auto';
            ctx.scale(dpr, dpr);
            
            // 背景
            const grad = ctx.createLinearGradient(0, 0, 600, 1000);
            grad.addColorStop(0, '#1a1a2e');
            grad.addColorStop(0.5, '#16213e');
            grad.addColorStop(1, '#0f3460');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 600, 1000);
            
            // 边框
            ctx.strokeStyle = '#d4af37';
            ctx.lineWidth = 6;
            ctx.strokeRect(15, 15, 570, 970);
            ctx.lineWidth = 1;
            ctx.strokeRect(25, 25, 550, 950);
            
            // 标题

            ctx.font = 'bold 32px -apple-system, PingFang SC';

            // 古典批语

            // 分隔线
            ctx.strokeStyle = '#d4af37';
            ctx.beginPath();
            ctx.moveTo(80, 190);
            ctx.lineTo(520, 190);
            ctx.stroke();
            
            // 内容
            let y = 220;
            ctx.textAlign = 'left';
            
            ctx.fillStyle = '#d4af37';
            ctx.font = 'bold 14px -apple-system, PingFang SC';
            ctx.fillText(`☯ ${currentResult.personality.element}行 · ${currentResult.personality.type}`, 50, y);
            y += 25;
            
            ctx.fillStyle = '#e8dcc8';
            ctx.font = '12px -apple-system, PingFang SC';

            ctx.font = 'bold 14px -apple-system, PingFang SC';
            ctx.fillText(`💼 事业 [${currentResult.career.level}]`, 50, y);
            y += 22;
            ctx.fillStyle = '#e8dcc8';
            ctx.font = '12px -apple-system, PingFang SC';
            wrapText(ctx, currentResult.career.text, 50, y, 500, 18);
            y += 38;
            
            ctx.fillStyle = '#d4af37';
            ctx.font = 'bold 14px -apple-system, PingFang SC';
            ctx.fillText(`💕 姻缘 [${currentResult.love.status}]`, 50, y);
            y += 22;
            ctx.fillStyle = '#e8dcc8';
            wrapText(ctx, currentResult.love.text, 50, y, 500, 18);
            y += 38;
            
            // 人生走向
            ctx.fillStyle = '#ffd700';

            currentResult.lifePath.forEach(item => {

            // 分隔线

            ctx.stroke();

            ctx.font = 'italic 14px -apple-system, PingFang SC';
            ctx.textAlign = 'center';
            wrapText(ctx, currentResult.blessing, 300, y, 520, 20);
            
            // 底部
            ctx.fillStyle = '#b8860b';
            ctx.font = '10px -apple-system, PingFang SC';
            ctx.fillText('仅供娱乐 · 无科学依据 · 扫码测面相', 300, 970);
            
            document.getElementById('posterModal').classList.add('active');

        function wrapText(ctx, text, x, y, maxW, lh) {
            const chars = text.split('');
            let line = '';
            for (let i = 0; i < chars.length; i++) {
                const test = line + chars[i];
                if (ctx.measureText(test).width > maxW && i > 0) {
                    ctx.fillText(line, x, y);
                    line = chars[i];
                    y += lh;
                } else {
                    line = test;
                }
            }
            ctx.fillText(line, x, y);
        }

            document.getElementById('posterModal').classList.remove('active');

            const canvas = document.getElementById('posterCanvas');
            try {

                const file = new File([blob], `神相天机_${Date.now()}.png`, { type: 'image/png' });
                
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({ files: [file], title: '我的面相分析' });
                } else {
                    const url = canvas.toDataURL();
                    const a = document.createElement('a');
                    a.href = url;

                    a.click();

                const url = canvas.toDataURL();
                const a = document.createElement('a');
                a.href = url;
                a.download = `神相天机_${Date.now()}.png`;
                a.click();
            }
        }

            document.getElementById('infoSection').style.display = 'block';

            document.querySelectorAll('.gender-btn').forEach(btn => btn.classList.remove('selected'));
            userGender = null;

            faceFeatures = null;
            currentResult = null;
        }
